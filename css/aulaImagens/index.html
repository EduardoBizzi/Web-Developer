<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Trabalhando com imagens</title>
    <style>
    img {
        width: 500px;
    }
    </style>
</head>
<body>
    <h1>Trabalhando com imagens</h1>
    <h2>Imagem Bitmap</h2>
    <img src="imagens/imagens/logo-sem-fundo.png" alt="imagem do logo sem fundo png">
    <h2>Imagem Vetorial</h2>
    <img src="imagens/imagens/logo-sem-fundo.svg" alt="imagem do logo sem fundo svg">
    <h2>Gif Animado</h2>
    <img src="imagens/imagens/gif-animado.gif" alt="imagem com um gif animado">
</body>
</html>
