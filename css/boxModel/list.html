<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Listas</title>
    <style>
        ul li{
            background-color: lightgray;
             list-style-type: square;
        }
        ol li{
            background-color: lightblue;
            list-style-type: lower-roman;
        }
    </style>
</head>
<body>
    <h1>Listas</h1>
    <ul>
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ul>
    <ol>
        <li>Item A</li>
        <li>Item B</li>
        <li>Item C</li>
    </ol>
</body>
</html>
